<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>66Lottery</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Trebuchet MS', sans-serif;
}

body {
    background: url('background.jpg') no-repeat center center fixed;
    background-size: cover;
    color: white;
}

/* Overlay */
.overlay {
    background: rgba(0,0,0,0.6);
    min-height: 100vh;
    padding: 15px;
}

/* Header */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    font-size: clamp(26px, 4vw, 40px);
    font-weight: bold;
    color: gold;
}

.register-btn {
    background: linear-gradient(45deg, gold, orange);
    border: none;
    padding: 12px 20px;
    font-size: clamp(14px, 2vw, 18px);
    border-radius: 25px;
    cursor: pointer;
    font-weight: bold;
}

.register-btn:hover {
    transform: scale(1.1);
}

/* Hero */
.hero {
    text-align: center;
    margin-top: 40px;
}

.hero h1 {
    font-size: clamp(40px, 7vw, 70px);
    color: gold;
}

.hero p {
    font-size: clamp(18px, 3vw, 24px);
}

/* Jackpot */
.jackpot {
    margin-top: 20px;
    font-size: clamp(22px, 4vw, 36px);
    color: #00ffcc;
}

/* Features */
.features {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px,1fr));
    gap: 20px;
    margin-top: 50px;
}

.card {
    background: rgba(0,0,0,0.6);
    padding: 20px;
    border-radius: 15px;
    text-align: center;
}

.card h3 {
    color: gold;
    margin-bottom: 10px;
}

/* Footer */
footer {
    text-align: center;
    margin-top: 40px;
    font-size: 14px;
}
</style>
</head>

<body>

<div class="overlay">

<header>
    <div class="logo">66Lottery</div>

    <!-- REGISTER BUTTON -->
    <button class="register-btn"
        onclick="window.location.href='https://www.66lotterym.com/#/pages/login/register?invitationCode=0709458577'">
        Register
    </button>
</header>

<section class="hero">
    <h1>WIN BIG TODAY</h1>
    <p>Poker • Slots • Lottery • Sports Betting</p>

    <!-- JACKPOT -->
    <div class="jackpot">
        JACKPOT: ₹<span id="jackpot">1,000,000</span>
    </div>
</section>

<section class="features">
    <div class="card">
        <h3>Poker</h3>
        <p>Play and win big</p>
    </div>

    <div class="card">
        <h3>Slots</h3>
        <p>Spin the reels</p>
    </div>

    <div class="card">
        <h3>Lottery</h3>
        <p>Try your luck</p>
    </div>

    <div class="card">
        <h3>Sports</h3>
        <p>Bet on games</p>
    </div>
</section>

<footer>
    © 2026 66Lottery
</footer>

</div>

<!-- JACKPOT SCRIPT -->
<script>
let value = 1000000;

setInterval(() => {
    value += Math.floor(Math.random() * 500);

    document.getElementById("jackpot").innerText =
        value.toLocaleString('en-IN'); // Indian format
}, 1000);
</script>

</body>
</html>
