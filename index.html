<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>66Lottery</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Trebuchet MS',sans-serif;}
body{background:url('background.jpg') no-repeat center center fixed;background-size:cover;color:white;}
.overlay{background:rgba(0,0,0,0.6);min-height:100vh;padding:15px;}
header{display:flex;justify-content:space-between;align-items:center;}
.logo{font-size:clamp(26px,4vw,40px);font-weight:bold;color:gold;}
.register-btn{background:linear-gradient(45deg,gold,orange);border:none;padding:16px 28px;font-size:clamp(18px,3vw,24px);border-radius:30px;cursor:pointer;font-weight:bold;box-shadow:0 0 15px rgba(255,165,0,0.8);transform:scale(1.1);} 
.hero{text-align:center;margin-top:40px;}
.hero h1{font-size:clamp(40px,7vw,70px);color:gold;}
.hero p{font-size:clamp(18px,3vw,24px);} 
.jackpot{margin-top:20px;font-size:clamp(22px,4vw,36px);color:#00ffcc;}
.features{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:20px;margin-top:50px;}
.card{background:rgba(0,0,0,0.6);padding:20px;border-radius:15px;text-align:center;}
.card h3{color:gold;margin-bottom:10px;}
.card button{padding:10px 14px;border:none;border-radius:10px;background:gold;color:black;font-weight:bold;cursor:pointer;}
footer{text-align:center;margin-top:40px;font-size:14px;}

/* POPUP */
.popup{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:flex;justify-content:center;align-items:center;visibility:hidden;}
.popup-content{background:#111;padding:25px;border-radius:15px;text-align:center;}
.popup button{margin-top:15px;padding:10px 20px;border:none;border-radius:10px;background:gold;font-weight:bold;cursor:pointer;}

/* SLOT LOADER */
.loader{position:fixed;top:0;left:0;width:100%;height:100%;background:black;display:flex;justify-content:center;align-items:center;flex-direction:column;visibility:hidden;color:white;}
.reels{display:flex;gap:12px;font-size:44px;margin-bottom:12px;}
.reel{width:60px;height:70px;background:#111;border:2px solid gold;border-radius:10px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 10px rgba(255,215,0,0.6) inset;}
</style>
</head>

<body>
<div class="overlay">

<header>
<div class="logo">66Lottery</div>
<button class="register-btn" onclick="showPopup()">Register</button>
</header>

<section class="hero">
<h1>WIN BIG TODAY</h1>
<p>Slots • Lottery • Sports • Predictions</p>
<div class="jackpot">JACKPOT: ₹<span id="jackpot">1,000,000</span></div>
</section>

<section class="features">
<div class="card">
<h3>Prediction 🔥</h3>
<p>Live tips</p><br>
<button onclick="trackClick();window.open('https://t.me/lottery66bestindia','_blank')">Channel 1</button><br><br>
<button onclick="trackClick();window.open('https://t.me/Indian66Lottery11','_blank')">Channel 2</button>
</div>

<div class="card">
<h3>Slots 🎰</h3>
<button onclick="redirectUser()">Play</button>
</div>

<div class="card">
<h3>Lottery 🎟️</h3>
<button onclick="redirectUser()">Play</button>
</div>

<div class="card">
<h3>Sports ⚽</h3>
<button onclick="redirectUser()">Bet</button>
</div>
</section>

<!-- LIVE WINNERS FEED -->
<div class="card" style="margin-top:30px;">
<h3>🔥 Recent Winners</h3>
<ul id="winners" style="list-style:none;margin-top:10px;font-size:14px;"></ul>
</div>

<footer>© 2026 66Lottery | Clicks: <span id="clicks">0</span></footer>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="popup-content">
<h2>Register to Continue</h2>
<p>Join now and start winning!</p>
<button onclick="startRedirect()">Register Now</button>
</div>
</div>

<!-- SLOT LOADER WITH REAL ROLLING SYMBOLS -->
<div class="loader" id="loader">
<div class="reels">
<div class="reel" id="r1">🍒</div>
<div class="reel" id="r2">💎</div>
<div class="reel" id="r3">7️⃣</div>
</div>
<div>Spinning...</div>
</div>

<script>
// Jackpot
let value=1000000;
setInterval(()=>{
value+=Math.floor(Math.random()*500);
document.getElementById("jackpot").innerText=value.toLocaleString('en-IN');
},1000);

// Click tracking
let clicks=0;
function trackClick(){clicks++;document.getElementById("clicks").innerText=clicks;}

function showPopup(){trackClick();document.getElementById("popup").style.visibility='visible';}
function redirectUser(){showPopup();}

// Slot symbols
const symbols = ['🍒','🍋','🍉','🔔','💎','7️⃣','⭐','🍀'];
let spinInterval;

function spinReels(){
  const r1 = document.getElementById('r1');
  const r2 = document.getElementById('r2');
  const r3 = document.getElementById('r3');
  spinInterval = setInterval(()=>{
    r1.textContent = symbols[Math.floor(Math.random()*symbols.length)];
    r2.textContent = symbols[Math.floor(Math.random()*symbols.length)];
    r3.textContent = symbols[Math.floor(Math.random()*symbols.length)];
  }, 120);
}

function stopReels(){
  clearInterval(spinInterval);

  const r1 = document.getElementById('r1');
  const r2 = document.getElementById('r2');
  const r3 = document.getElementById('r3');

  // 🎉 Force winning combination
  const winSymbol = '💎';
  r1.textContent = winSymbol;
  r2.textContent = winSymbol;
  r3.textContent = winSymbol;

  // ✨ Flash effect
  let flashes = 0;
  const flashInterval = setInterval(() => {
    r1.style.background = flashes % 2 === 0 ? 'gold' : '#111';
    r2.style.background = flashes % 2 === 0 ? 'gold' : '#111';
    r3.style.background = flashes % 2 === 0 ? 'gold' : '#111';
    flashes++;

    if (flashes > 6) {
      clearInterval(flashInterval);
    }
  }, 150);
}

function startRedirect(){
  document.getElementById("popup").style.visibility='hidden';
  document.getElementById("loader").style.visibility='visible';

  spinReels();

  setTimeout(()=>{
    stopReels();
    window.location.href='https://www.66lotterym.com/#/pages/login/register?invitationCode=0709458577';
  },2500);
}
// 🎉 Fake live winners feed
const names = ['Ravi','Amit','Suresh','Priya','Rahul','Anjali','Kiran','Vikram','Neha'];

function addWinner(){
  const list = document.getElementById('winners');
  const li = document.createElement('li');

  const name = names[Math.floor(Math.random()*names.length)];
  const amount = (Math.floor(Math.random()*9000)+1000).toLocaleString('en-IN');

  li.textContent = `${name} won ₹${amount}`;
  list.prepend(li);

  // limit to 5 items
  if(list.children.length > 5){
    list.removeChild(list.lastChild);
  }
}

setInterval(addWinner, 2000);

</script>

</body>
</html>
